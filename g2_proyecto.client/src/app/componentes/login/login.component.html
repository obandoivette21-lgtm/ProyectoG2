<div class="auth-container container">
  <div class="auth-card card">
    <h2>Iniciar Sesión</h2>
    <p class="auth-subtitle">Accede a tu cuenta en Sabor Express para realizar pedidos y reservas.</p>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="exito" class="alert alert-success">
      {{ exito }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="correo" class="form-control" required placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" [(ngModel)]="contrasena" class="form-control" required placeholder="Tu contraseña">
      </div>

      <button type="submit" class="btn btn-block">Ingresar</button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes una cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </div>
  </div>
</div>

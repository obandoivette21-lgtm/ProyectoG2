<div class="auth-container container">
  <div class="auth-card card">
    <h2>Registrarse</h2>
    <p class="auth-subtitle">Crea tu cuenta para acceder a todos los beneficios de Sabor Express.</p>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="exito" class="alert alert-success">
      {{ exito }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" [(ngModel)]="nombre" class="form-control" required placeholder="Tu nombre y apellido">
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="correo" class="form-control" required placeholder="correo@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" [(ngModel)]="contrasena" class="form-control" required placeholder="Crea una contraseña segura">
      </div>

      <button type="submit" class="btn btn-block">Registrar Cuenta</button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
